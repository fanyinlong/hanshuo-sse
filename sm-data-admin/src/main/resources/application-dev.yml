# 项目相关配置
shenmei:
  # 名称
  name: shenmei-data
  # 版本
  version: 1.0.0
  # 版权年份
  copyrightYear: 2025
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: E:/data/shenmei/

  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

## 日志配置
logging:
  level:
    com.shenmei.data.sse: info
    org.springframework: warn

